services:
  icmr-website:
    # Tells Compose to build using the Dockerfile in the current directory
    build: .
    container_name: icmr2027-web
    ports:
      # Maps port 8080 on your local machine to port 80 inside the container
      - "8080:80"
    volumes:
      # Maps your local folder to the container's folder for live updates
      - .:/usr/share/nginx/html
    restart: unless-stopped
